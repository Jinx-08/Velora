<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" width="250" height="80">
  <defs>
    <!-- Brand vibrant green gradient -->
    <linearGradient id="vibrantGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b461" />
      <stop offset="100%" stop-color="#0e9952" />
    </linearGradient>
    <!-- Brand dark teal gradient -->
    <linearGradient id="darkTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#015554" />
      <stop offset="100%" stop-color="#013f3e" />
    </linearGradient>
  </defs>

  <!-- Super soft mint/teal background square -->
  <rect x="0" y="15" width="50" height="50" rx="14" fill="#eaf6f0" />
  
  <!-- Stylish, overlapping "Capsule" V design -->
  <g stroke-linecap="round">
    <!-- Left arm (Dark Teal) -->
    <line x1="16" y1="27" x2="25.5" y2="48" stroke="url(#darkTeal)" stroke-width="7.5" />
    <!-- Right arm (Vibrant Green) - Overlaps to create depth -->
    <line x1="34" y1="27" x2="25.5" y2="48" stroke="url(#vibrantGreen)" stroke-width="7.5" />
  </g>
  
  <!-- Text matching the dark teal for strong contrast -->
  <text x="62" y="50%" text-anchor="start" dominant-baseline="central" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.02em" fill="#015554">
    Velora
  </text>
</svg>
